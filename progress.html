<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kintsugi | Progress</title>
  <style>
    :root{
      --bg1:#040b3a; --bg2:#0a1f77; --bg3:#061041;
      --gold:#8a6b11; --nav:#ffe27a; --nav2:#ffd65a;
      --softShadow: 0 12px 30px rgba(0,0,0,.35);
      --white:#fff; --ink:#121212;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--white);
      background:
        radial-gradient(1200px 520px at 78% 12%, rgba(255,210,90,.22), transparent 55%),
        linear-gradient(120deg, var(--bg1), var(--bg2) 55%, var(--bg3));
    }
    .font-ui{ font-family:"Clear Sans","Segoe UI",Arial,sans-serif; }
    .wrap{ width:min(1180px, 96vw); margin:20px auto 60px; padding:0 10px; }
    .topbar{ display:flex; align-items:center; gap:18px; margin-top:10px; }

    .brandPill{
      display:flex; align-items:center; gap:14px;
      padding:16px 24px 16px 16px; border-radius:26px;
      background: linear-gradient(90deg, #2b1c00, var(--gold));
      box-shadow: var(--softShadow);
      min-width:340px;
    }
   .logoBox{
      width:62px;
      height:62px;
      border-radius:14px;
      position:relative;
      overflow:visible;
      outline: 3px solid rgba(255,255,255,.15);
      flex:0 0 auto;
    }
    .logoBox img{
      width: 100%;
      height: 100%;
      object-fit: contain; 
      display: block;
      border-radius:15px;
    }

    .brandName{
      font-size:42px; font-weight:700; letter-spacing:.5px; line-height:1;
      color:#fff; text-decoration:none; display:inline-block;
    }
    .brandName:hover{ filter:brightness(1.06); transform: translateY(-1px); }

    .navPill{
      flex:1; display:flex; justify-content:space-between; align-items:center; gap:12px;
      padding:12px 18px; border-radius:18px;
      background: linear-gradient(180deg, var(--nav), var(--nav2));
      box-shadow: var(--softShadow); color:var(--ink);
    }
    .navPill a{
      text-decoration:none; color:#0f0f0f; padding:8px 14px; border-radius:999px;
      font-weight:700; border:2px solid transparent; transition:.18s ease;
    }
    .navPill a:hover{ background: rgba(255,255,255,.35); transform: translateY(-1px); }
    .navPill a.active{ border-color:#111; background: rgba(255,255,255,.25); }

    .layout{
      margin-top:26px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:22px;
      align-items:start;
    }

    .panel{
      border-radius:16px;
      background: linear-gradient(180deg, rgba(6,15,70,.75), rgba(6,10,45,.75));
      border:2px solid rgba(255,255,255,.10);
      box-shadow: var(--softShadow);
      padding:16px;
      position:relative;
      overflow:hidden;
    }

    .topRow{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .actionRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .actionBtn{
      height:38px;
      border-radius:999px;
      border:2px solid rgba(255,226,122,.65);
      background: rgba(255,226,122,.18);
      color:#fff;
      font-weight:900;
      cursor:pointer;
      padding:0 16px;
      transition:.12s ease;
    }
    .actionBtn:hover{ transform: translateY(-1px); filter:brightness(1.05); }

    .actionBtn.secondary{
      border-color: rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
    }

    .calHeader{
      display:flex; justify-content:space-between; align-items:center; gap:12px;
      margin-bottom:12px;
    }
    .calTitle{
      font-weight:900; letter-spacing:.6px;
      padding:8px 12px; border-radius:999px;
      background: rgba(255,226,122,.18);
      border: 1px solid rgba(255,226,122,.35);
    }
    .calNav{ display:flex; gap:10px; }
    .iconBtn{
      width:44px; height:38px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      color:#fff; font-size:20px; font-weight:900;
      cursor:pointer;
      transition:.12s ease;
    }
    .iconBtn:hover{ transform: translateY(-1px); filter:brightness(1.06); }

    .monthYear{
      display:flex; gap:8px; align-items:center; flex-wrap:wrap;
      margin-bottom:10px;
      font-weight:900;
    }
    .pill{
      padding:8px 12px;
      border-radius:999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.12);
    }

    .weekdays, .days{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap:8px;
    }
    .weekdays div{
      text-align:center; font-size:12px; opacity:.9;
      padding:6px 0; letter-spacing:.5px;
    }

    .day{
      height:44px;
      border-radius:12px;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
      transition:.15s ease;
      position:relative;
      user-select:none;
    }
    .day:hover{ transform: translateY(-2px); background: rgba(255,255,255,.12); }
    .day.selected{
      outline:2px solid rgba(255,226,122,.85);
      background: rgba(255,226,122,.18);
      font-weight:900;
      animation: pop .18s ease;
    }
    @keyframes pop{ from{ transform: scale(.98); } to{ transform: scale(1); } }
    .day.muted{ opacity:.35; cursor:default; }
    .dot{
      position:absolute; bottom:6px;
      width:6px; height:6px; border-radius:99px;
      background: rgba(255,226,122,.95);
      box-shadow: 0 0 10px rgba(255,226,122,.35);
    }

    .recordTitle{
      font-weight:900;
      letter-spacing:.6px;
      padding:10px 12px;
      border-radius:999px;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.12);
      margin-bottom:12px;
      display:inline-block;
    }
    .recordCard{
      display:grid;
      grid-template-columns: 220px 1fr;
      gap:14px;
      align-items:start;
    }
    .imgBox{
      width:100%;
      height:180px;
      border-radius:14px;
      background: linear-gradient(#cfefff, #9ad4ff 55%, #a8e07f 56%, #5fae2a);
      outline: 3px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 20px rgba(0,0,0,.25);
      overflow:hidden;
      display:grid;
      place-items:center;
      color:#0a0a0a;
      font-weight:900;
    }
    .imgBox img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .descBox{
      padding:14px;
      border-radius:14px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.12);
      min-height:180px;
      white-space:pre-wrap;
      line-height:1.35;
    }

    .modalBack{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:none; align-items:center; justify-content:center;
      padding:18px;
      z-index:30;
    }
    .modal{
      width:min(760px, 96vw);
      border-radius:18px;
      background: linear-gradient(180deg, rgba(10,25,110,.92), rgba(5,10,55,.92));
      border:2px solid rgba(255,255,255,.14);
      box-shadow: var(--softShadow);
      padding:16px;
    }
    .modalTop{
      display:flex; justify-content:space-between; align-items:center; gap:10px;
      margin-bottom:10px;
    }
    .modalTitle{
      font-weight:900;
      letter-spacing:.5px;
      padding:8px 12px;
      border-radius:999px;
      background: rgba(255,226,122,.16);
      border: 1px solid rgba(255,226,122,.35);
    }
    .closeBtn{
      height:36px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.18);
      color:#fff;
      font-weight:900;
      cursor:pointer;
      padding:0 14px;
    }
    .formRow{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      margin-top:10px;
    }
    textarea{
      width:100%;
      min-height:120px;
      border-radius:14px;
      border:2px solid rgba(255,255,255,.15);
      background: rgba(0,0,0,.18);
      color:#fff;
      padding:12px;
      resize:vertical;
      outline:none;
    }
    input[type="file"]{
      width:100%;
      border-radius:14px;
      border:2px solid rgba(255,255,255,.15);
      background: rgba(0,0,0,.18);
      color:#fff;
      padding:10px;
    }
    .saveBtn{
      margin-top:12px;
      height:40px;
      border-radius:999px;
      border:2px solid rgba(255,226,122,.65);
      background: rgba(255,226,122,.18);
      color:#fff;
      font-weight:900;
      cursor:pointer;
      padding:0 16px;
    }

    @media (max-width: 980px){
      .topbar{flex-direction:column; align-items:stretch;}
      .brandPill{min-width:unset;}
      .layout{grid-template-columns:1fr;}
      .recordCard{grid-template-columns:1fr;}
      .imgBox{height:220px;}
      .formRow{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brandPill font-ui">
       <div class="logoBox"><img src="Kintsugilogo.png"></div>
        <a class="brandName" href="index.html">Kintsugi</a>
      </div>

      <nav class="navPill font-ui">
        <a href="workouts.html">Workouts</a>
        <a href="nutrition.html">Nutrition</a>
        <a href="therapy.html">Therapy</a>
        <a href="progress.html">Progress</a>
      </nav>
    </div>

    <div class="layout">
      <section class="panel font-ui">
        <div class="topRow">
          <div class="calTitle">Progress Calendar</div>
          <div class="actionRow">
            <button class="actionBtn" id="addRecordBtn">ADD RECORD</button>
            <button class="actionBtn secondary" id="deleteRecordBtn">DELETE RECORD</button>
          </div>
        </div>

        <div class="calHeader">
          <div class="monthYear">
            <span class="pill" id="monthLabel">Month</span>
            <span class="pill" id="yearLabel">Year</span>
          </div>
          <div class="calNav">
            <button class="iconBtn" id="prevMonth">‹</button>
            <button class="iconBtn" id="nextMonth">›</button>
          </div>
        </div>

        <div class="weekdays">
          <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
        </div>
        <div style="height:8px"></div>
        <div class="days" id="daysGrid"></div>
      </section>

      <section class="panel font-ui">
        <div class="recordTitle" id="recordTitle">Select date: DD/MM/YY</div>

        <div class="recordCard">
          <div class="imgBox" id="imgBox">Image</div>
          <div class="descBox" id="descBox">Record found: Select a date to view your record.</div>
        </div>
      </section>
    </div>
  </div>

  <div class="modalBack" id="modalBack">
    <div class="modal font-ui">
      <div class="modalTop">
        <div class="modalTitle">New Record</div>
        <button class="closeBtn" id="closeModal">Close</button>
      </div>

      <div class="formRow">
        <div>
          <div style="font-weight:900; margin-bottom:8px;">Upload image</div>
          <input type="file" id="fileInput" accept="image/*" />
          <div style="height:10px"></div>
          <div style="font-weight:900; margin-bottom:8px;">Date</div>
          <input type="date" id="dateInput"
            style="width:100%; height:42px; border-radius:14px; border:2px solid rgba(255,255,255,.15); background:rgba(0,0,0,.18); color:#fff; padding:0 12px;">
        </div>

        <div>
          <div style="font-weight:900; margin-bottom:8px;">Description</div>
          <textarea id="descInput" placeholder="Write a short description of your progress..."></textarea>
        </div>
      </div>

      <button class="saveBtn" id="saveRecord">Save record</button>
    </div>
  </div>

  <script>
    // active nav
    document.querySelectorAll(".navPill a").forEach(a=>{
      if(a.getAttribute("href") === "progress.html") a.classList.add("active");
    });

    const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    let viewDate = new Date();
    viewDate.setDate(1);

    const recordsKey = "kintsugi_progress_records_v1";
    const records = JSON.parse(localStorage.getItem(recordsKey) || "{}"); // { iso: {imgDataUrl, desc} }
    let selectedISO = null;

    const monthLabel = document.getElementById("monthLabel");
    const yearLabel  = document.getElementById("yearLabel");
    const daysGrid   = document.getElementById("daysGrid");

    const recordTitle = document.getElementById("recordTitle");
    const imgBox = document.getElementById("imgBox");
    const descBox = document.getElementById("descBox");

    function toISO(d){
      const y=d.getFullYear();
      const m=String(d.getMonth()+1).padStart(2,"0");
      const da=String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${da}`;
    }
    function prettyISO(iso){
      const [y,m,d] = iso.split("-");
      return `${d}/${m}/${y}`;
    }

    function renderCalendar(){
      monthLabel.textContent = monthNames[viewDate.getMonth()];
      yearLabel.textContent  = viewDate.getFullYear();
      daysGrid.innerHTML = "";

      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const firstDay = new Date(year, month, 1);
      const startWeekday = firstDay.getDay();
      const daysInMonth = new Date(year, month+1, 0).getDate();

      for(let i=0;i<startWeekday;i++){
        const div = document.createElement("div");
        div.className = "day muted";
        daysGrid.appendChild(div);
      }

      for(let day=1; day<=daysInMonth; day++){
        const d = new Date(year, month, day);
        const iso = toISO(d);

        const cell = document.createElement("div");
        cell.className = "day";
        cell.textContent = day;

        if(records[iso]) {
          const dot = document.createElement("div");
          dot.className = "dot";
          cell.appendChild(dot);
        }
        if(selectedISO === iso) cell.classList.add("selected");

        cell.addEventListener("click", ()=>{
          selectedISO = iso;
          showRecord(iso);
          renderCalendar();
        });

        daysGrid.appendChild(cell);
      }
    }

    function showRecord(iso){
      recordTitle.textContent = `Record for: ${prettyISO(iso)}`;
      const rec = records[iso];

      if(!rec){
        imgBox.innerHTML = "Image";
        descBox.textContent = "Record found: No record on this date yet. Press ADD RECORD to create one.";
        return;
      }

      imgBox.innerHTML = "";
      const img = document.createElement("img");
      img.src = rec.imgDataUrl;
      img.alt = "Progress image";
      imgBox.appendChild(img);

      descBox.textContent = rec.desc || "No description.";
    }

    document.getElementById("prevMonth").addEventListener("click", ()=>{
      viewDate.setMonth(viewDate.getMonth()-1);
      renderCalendar();
    });
    document.getElementById("nextMonth").addEventListener("click", ()=>{
      viewDate.setMonth(viewDate.getMonth()+1);
      renderCalendar();
    });

    // modal
    const modalBack = document.getElementById("modalBack");
    const addRecordBtn = document.getElementById("addRecordBtn");
    const closeModal = document.getElementById("closeModal");
    const fileInput = document.getElementById("fileInput");
    const dateInput = document.getElementById("dateInput");
    const descInput = document.getElementById("descInput");

    addRecordBtn.addEventListener("click", ()=>{
      modalBack.style.display = "flex";
      dateInput.value = selectedISO || toISO(new Date());
      descInput.value = "";
      fileInput.value = "";
    });

    closeModal.addEventListener("click", ()=> modalBack.style.display = "none");
    modalBack.addEventListener("click", (e)=>{ if(e.target === modalBack) modalBack.style.display = "none"; });

    document.getElementById("saveRecord").addEventListener("click", ()=>{
      const iso = dateInput.value;
      if(!iso){ alert("Pick a date."); return; }
      const file = fileInput.files[0];
      const desc = descInput.value.trim();
      if(!file){ alert("Upload an image."); return; }

      const reader = new FileReader();
      reader.onload = () => {
        records[iso] = { imgDataUrl: reader.result, desc };
        localStorage.setItem(recordsKey, JSON.stringify(records));

        selectedISO = iso;
        const [y,m] = iso.split("-").map(Number);
        viewDate = new Date(y, m-1, 1);

        modalBack.style.display = "none";
        showRecord(iso);
        renderCalendar();
      };
      reader.readAsDataURL(file);
    });

    document.getElementById("deleteRecordBtn").addEventListener("click", ()=>{
      if(!selectedISO){ alert("Pick a date first."); return; }
      if(!records[selectedISO]){ alert("No record saved on this date."); return; }
      if(!confirm("Delete this progress record?")) return;

      delete records[selectedISO];
      localStorage.setItem(recordsKey, JSON.stringify(records));

      imgBox.innerHTML = "Image";
      descBox.textContent = "Record deleted. Select another date or add a new record.";
      recordTitle.textContent = "Select date: DD/MM/YY";
      renderCalendar();
    });

    renderCalendar();
  </script>
</body>
</html>
